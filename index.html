  <body>
    <div id="root"></div>
    <script>
      (function() {
        function injectSocial() {
          var footer = document.querySelector('footer');
          if (!footer || document.getElementById('eleganda-social-bar')) return;
          var footerInner = footer.querySelector('.max-w-7xl');
          if (!footerInner) return;
          var bar = document.createElement('div');
          bar.id = 'eleganda-social-bar';
          bar.innerHTML = '<a href="https://www.facebook.com/people/Eleganda-Management-Consulting-LLC/61575902671659/" target="_blank" rel="noopener noreferrer"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Follow us on Facebook</a>';
          footerInner.appendChild(bar);
        }
        setTimeout(injectSocial, 900);
        var obs = new MutationObserver(function() {
          if (!document.getElementById('eleganda-social-bar')) injectSocial();
        });
        document.addEventListener('DOMContentLoaded', function() {
          obs.observe(document.body, { childList: true, subtree: false });
          setTimeout(injectSocial, 900);
        });
      })();
    </script>
